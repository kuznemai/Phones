<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 48" fill="none">
  <!-- Chip outline -->
  <rect x="7" y="6" width="30" height="28" rx="3" stroke="white" stroke-width="1.3"/>

  <!-- Pin lines top -->
  <line x1="14" y1="6"  x2="14" y2="2"  stroke="white" stroke-width="1.1"/>
  <line x1="21" y1="6"  x2="21" y2="2"  stroke="white" stroke-width="1.1"/>
  <line x1="30" y1="6"  x2="30" y2="2"  stroke="white" stroke-width="1.1"/>

  <!-- Pin lines bottom -->
  <line x1="14" y1="34" x2="14" y2="38" stroke="white" stroke-width="1.1"/>
  <line x1="21" y1="34" x2="21" y2="38" stroke="white" stroke-width="1.1"/>
  <line x1="30" y1="34" x2="30" y2="38" stroke="white" stroke-width="1.1"/>

  <!-- Pin lines left -->
  <line x1="7"  y1="14" x2="3"  y2="14" stroke="white" stroke-width="1.1"/>
  <line x1="7"  y1="26" x2="3"  y2="26" stroke="white" stroke-width="1.1"/>

  <!-- Pin lines right -->
  <line x1="37" y1="14" x2="41" y2="14" stroke="white" stroke-width="1.1"/>
  <line x1="37" y1="26" x2="41" y2="26" stroke="white" stroke-width="1.1"/>

  <!-- Letter I -->
  <line x1="14" y1="13" x2="14" y2="27" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Letter Z -->
  <path d="M18 13 L26 13 L18 27 L26 27" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="48" y="29.5" font-family="system-ui,-apple-system,sans-serif" font-size="25" fill="white" font-weight="300" letter-spacing="2">IZ</text>
  <text x="49" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="7.4" fill="#a3a3a3" font-weight="400" letter-spacing="1.35">OPERATING SYSTEM</text>
</svg>
